<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>ГОСПОДАР</title>
    <script>
      // Redirects deep links / page refreshes to index.html so React Router
      // can take over, since GitHub Pages has no server-side rewrites.
      // Based on the well-known spa-github-pages technique.
      var pathSegmentsToKeep = 1; // keeps "/Hospodar" as the base segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
