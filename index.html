  <body>
    <script>
      // Restores the real path after 404.html redirected here with ?p=...
      (function (l) {
        if (l.search[1] === 'p' && l.search.slice(1, 3) === 'p=') {
          var decoded = l.search.slice(3).split('&').map(function (s) {
            return s.replace(/~and~/g, '&')
          })
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          )
        }
      })(window.location)
    </script>
    <div id="root"></div>
  </body>
